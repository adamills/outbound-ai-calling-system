;
; Asterisk Dialplan Configuration
; Outbound AI Calling System
; Routes outbound calls through Telnyx SIP trunk and ElevenLabs AI
;

[globals]
; Global variables
TELNYX_SIP_TRUNK=SIP/telnyx
AI_SERVER=http://localhost:5000
ASTERISK_CONTEXT=from-internal

[from-internal]
; Main context for outbound calls
exten => _X.,1,NoOp(Processing outbound call to ${EXTEN})
same  => n,Set(CAMPAIGN_ID=${ARG1})
same  => n,Set(VOICE_ID=${ARG2:default})
same  => n,Dial(${TELNYX_SIP_TRUNK}/${EXTEN},30,m)
same  => n,Hangup()

[ai-dialplan]
; Context for AI-controlled calls
exten => s,1,NoOp(Starting AI call handler)
same  => n,Set(CALL_ID=${UNIQUEID})
same  => n,Answer()
same  => n,Set(CALL_START_TIME=${STRFTIME(${EPOCH},UTC,%Y-%m-%d %H:%M:%S)})

; Bridge to AI server for processing
same  => n,AGI(agi://localhost:4573/ai-handler?campaign=${CAMPAIGN_ID}&voice=${VOICE_ID})
same  => n,Hangup()

[outbound-campaigns]
; Dedicated context for campaign dialing
; Usage: Dial(Local/5551234567@outbound-campaigns)

exten => _X.,1,NoOp(Campaign dial: ${EXTEN})
same  => n,Set(TIMEOUT(absolute)=1800)
same  => n,Dial(${TELNYX_SIP_TRUNK}/${EXTEN},30,m)
same  => n,Hangup()

[from-telnyx]
; Inbound calls from Telnyx
exten => s,1,NoOp(Inbound call from Telnyx)
same  => n,Answer()
same  => n,Playback(welcome)
same  => n,Dial(SIP/internal-extension,30)
same  => n,Voicemail(u${EXTEN})
same  => n,Hangup()

[call-recording]
; Context for recording calls
exten => s,1,NoOp(Starting call recording)
same  => n,Set(RECORD_FILE=/var/spool/asterisk/recordings/${UNIQUEID})
same  => n,Record(${RECORD_FILE}:gsm,,${TIMEOUT(recording)})
same  => n,Return()

[error-handling]
; Error handling context
exten => i,1,NoOp(Invalid extension: ${EXTEN})
same  => n,Playback(invalid)
same  => n,Hangup()

exten => t,1,NoOp(Timeout on call)
same  => n,Playback(goodbye)
same  => n,Hangup()

exten => T,1,NoOp(Call timeout occurred)
same  => n,Hangup()

; AGI Scripts configuration
[agi]
; AGI server listening on port 4573
enabled=yes
port=4573
bind=127.0.0.1
